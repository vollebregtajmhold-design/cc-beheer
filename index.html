<!DOCTYPE html>
<html lang="nl" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CC Beheer</title>
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CC Beheer">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root, [data-theme="light"]{
    --bg:#f5f6f8; --card:#ffffff; --border:#dde1e6; --input-bg:#f0f1f3;
    --text:#1a1d24; --muted:#6b7280; --accent:#4f8cff;
    --green:#4caf50; --red:#e57373;
  }
  [data-theme="dark"]{
    --bg:#0f1115; --card:#1a1d24; --border:#2a2e37; --input-bg:#11141a;
    --text:#e8eaed; --muted:#9aa0a6; --accent:#4f8cff;
    --green:#4caf50; --red:#e57373;
  }
  *{box-sizing:border-box; font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;}
  body{margin:0; background:var(--bg); color:var(--text); padding-bottom:70px;}
  header{padding:14px 16px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--bg); z-index:10;}
  h1{margin:0; font-size:18px;}
  .tabs{display:flex; gap:6px; padding:10px 16px 0;}
  .tab{flex:1; text-align:center; padding:10px 4px; border-radius:8px 8px 0 0; background:var(--border); color:var(--text); cursor:pointer; font-size:13px; font-weight:600; border:1px solid var(--border); border-bottom:none; opacity:0.6;}
  .tab.active{color:#fff; opacity:1; position:relative; top:1px;}
  .tab[data-tab="invoer"]{ background:#4f8cff; color:#fff; }
  .tab[data-tab="overzicht"]{ background:#4caf50; color:#fff; }
  .tab[data-tab="klanten"]{ background:#ff9800; color:#fff; }
  .tab.active{ opacity:1; box-shadow:0 -2px 6px rgba(0,0,0,0.15); transform:translateY(0); }
  .tab:not(.active){ opacity:0.55; }
  .content{padding:16px; max-width:700px; margin:0 auto;}
  .card{background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px; margin-bottom:12px;}
  label{display:block; font-size:12px; color:var(--muted); margin:8px 0 4px;}
  input, select, textarea{width:100%; padding:9px; border-radius:8px; border:1px solid var(--border); background:var(--input-bg); color:var(--text); font-size:14px;}
  button{padding:10px 14px; border-radius:8px; border:none; background:var(--accent); color:#fff; font-size:14px; cursor:pointer; margin-top:4px;}
  button.secondary{background:#2a2e37;}
  button.danger{background:var(--red);}
  .row{display:flex; gap:8px;}
  .row > *{flex:1;}
  table{width:100%; border-collapse:collapse; font-size:13px; margin-top:8px;}
  th, td{padding:6px 4px; border-bottom:1px solid var(--border); text-align:left;}
  th{color:var(--muted); font-weight:500;}
  .totals{display:flex; justify-content:space-between; font-weight:600; margin-top:8px; padding-top:8px; border-top:1px solid var(--border);}
  .hidden{display:none;}
  .small{font-size:12px; color:var(--muted);}
  .item-actions{display:flex; gap:6px; margin-top:6px;}
  .badge{display:inline-block; padding:2px 6px; border-radius:6px; background:#2a2e37; font-size:11px; color:var(--muted);}
</style>
</head>
<body>
<header>
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <h1>📦 CC Beheer 2026</h1>
    <button class="secondary" style="margin:0; padding:6px 10px;" onclick="toggleThema()">🌙/☀️</button>
  </div>
</header>

<div class="tabs">
  <div class="tab active" data-tab="invoer">Invoer</div>
  <div class="tab" data-tab="overzicht">Overzicht</div>
  <div class="tab" data-tab="klanten">Klanten</div>
</div>

<div class="content">

  <!-- INVOER -->
  <div id="tab-invoer" class="card">
    <label>Klant</label>
    <select id="i-klant" onchange="vulTransporteur()"></select>

    <label>Datum</label>
    <input type="date" id="i-datum">

    <label>Bonnummer</label>
    <input type="text" id="i-bon" readonly style="background:var(--input-bg); font-weight:600; border-color:var(--accent);">

    <div class="row">
      <div>
        <label>CC</label>
        <input type="number" id="i-cc" value="0">
      </div>
      <div>
        <label>Platen</label>
        <input type="number" id="i-platen" value="0">
      </div>
      <div>
        <label>Opzet</label>
        <input type="number" id="i-opzet" value="0">
      </div>
    </div>

    <label>Transporteur</label>
    <input type="text" id="i-transporteur" placeholder="bv. Hogenboom">

    <label>Opmerking</label>
    <textarea id="i-opmerking" rows="2"></textarea>

    <button onclick="opslaanInvoer()">✅ Opslaan</button>
    <div id="i-status" class="small"></div>

    <hr style="border-color:var(--border); margin:14px 0;">
    <div class="small">Laatste invoer</div>
    <table id="i-laatste"><tbody></tbody></table>
  </div>

  <!-- OVERZICHT -->
  <div id="tab-overzicht" class="card hidden">
    <label>Klant</label>
    <select id="o-klant" onchange="toonOverzicht()"></select>

    <div id="o-klantinfo" class="small" style="margin-top:8px;"></div>

    <table id="o-tabel">
      <thead>
        <tr><th>Datum</th><th>Wk</th><th>Bon</th><th>CC</th><th>Platen</th><th>Opzet</th><th>Opm.</th></tr>
      </thead>
      <tbody></tbody>
    </table>

    <div class="totals">
      <span id="o-totcc">CC: 0</span>
      <span id="o-totplaten">Platen: 0</span>
      <span id="o-totopzet">Opzet: 0</span>
    </div>

    <div class="item-actions">
      <button onclick="exportPdf()">📄 PDF</button>
      <button class="secondary" onclick="mailOverzicht()">✉️ Mail</button>
    </div>
  </div>

  <!-- KLANTEN -->
  <div id="tab-klanten" class="card hidden">
    <label>Naam</label>
    <input type="text" id="k-naam" placeholder="Klantnaam">
    <label>Adres</label>
    <input type="text" id="k-adres">
    <label>Woonplaats</label>
    <input type="text" id="k-woonplaats">
    <label>Telefoon</label>
    <input type="text" id="k-telefoon">
    <label>E-mail</label>
    <input type="email" id="k-email">
    <label>Vaste transporteur</label>
    <input type="text" id="k-transporteur" placeholder="bv. Hogenboom">
    <button onclick="opslaanKlant()">➕ Klant toevoegen</button>
    <div id="k-status" class="small"></div>

    <hr style="border-color:var(--border); margin:14px 0;">
    <div id="k-lijst"></div>
  </div>

</div>

// ---------- THEMA ----------
let thema = localStorage.getItem('cc_thema') || 'light';
document.documentElement.setAttribute('data-theme', thema);
function toggleThema(){
  thema = (thema === 'light') ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', thema);
  localStorage.setItem('cc_thema', thema);
}

function vulTransporteur(){
  const klant = document.getElementById('i-klant').value;
  const k = klanten.find(x=>x.naam===klant);
  document.getElementById('i-transporteur').value = (k && k.transporteur) ? k.transporteur : '';
}

// ---------- BONNUMMER ----------
function volgendBonnummer(){
  let max = 1000;
  invoer.forEach(r=>{
    const n = Number(r.bon);
    if(!isNaN(n) && n > max) max = n;
  });
  return max + 1;
}
function zetBonnummer(){
  document.getElementById('i-bon').value = volgendBonnummer();
}

// ---------- DATA ----------
function laad(key){ try{ return JSON.parse(localStorage.getItem(key)) || []; }catch(e){ return []; } }
function bewaar(key, data){ localStorage.setItem(key, JSON.stringify(data)); }

let klanten = laad('cc_klanten');
let invoer  = laad('cc_invoer');

// ---------- TABS ----------
document.querySelectorAll('.tab').forEach(t=>{
  t.onclick = ()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.content > .card').forEach(x=>x.classList.add('hidden'));
    t.classList.add('active');
    document.getElementById('tab-'+t.dataset.tab).classList.remove('hidden');
    if(t.dataset.tab==='overzicht') toonOverzicht();
    if(t.dataset.tab==='klanten') toonKlanten();
    if(t.dataset.tab==='invoer') toonLaatsteInvoer();
  };
});

// ---------- HELPERS ----------
function getISOWeek(date){
  const d = new Date(date.getTime());
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 4 - (d.getDay()||7));
  const yearStart = new Date(d.getFullYear(),0,1);
  return Math.ceil((((d-yearStart)/86400000)+1)/7);
}
function vulKlantSelects(){
  const opts = klanten.map(k=>`<option value="${k.naam}">${k.naam}</option>`).join('');
  document.getElementById('i-klant').innerHTML = '<option value="">-- kies klant --</option>'+opts;
  document.getElementById('o-klant').innerHTML = '<option value="">-- kies klant --</option>'+opts;
}
function fmtDatum(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('nl-NL',{day:'2-digit',month:'2-digit',year:'numeric'});
}

// ---------- INVOER ----------
document.getElementById('i-datum').value = new Date().toISOString().slice(0,10);

let bewerkInvoerId = null;

function opslaanInvoer(){
  const klant = document.getElementById('i-klant').value;
  const datum = document.getElementById('i-datum').value;
  if(!klant){ document.getElementById('i-status').textContent = '❌ Kies een klant.'; return; }
  if(!datum){ document.getElementById('i-status').textContent = '❌ Kies een datum.'; return; }

  const veld = {
    klant,
    datum,
    week: 'wk ' + getISOWeek(new Date(datum)),
    bon: document.getElementById('i-bon').value.trim(),
    transporteur: document.getElementById('i-transporteur').value.trim(),
    cc: Number(document.getElementById('i-cc').value)||0,
    platen: Number(document.getElementById('i-platen').value)||0,
    opzet: Number(document.getElementById('i-opzet').value)||0,
    opmerking: document.getElementById('i-opmerking').value.trim()
  };

  if(bewerkInvoerId){
    const idx = invoer.findIndex(r=>r.id===bewerkInvoerId);
    if(idx>-1) invoer[idx] = Object.assign({id: bewerkInvoerId}, veld);
    bewerkInvoerId = null;
    document.querySelector('#tab-invoer button').textContent = '✅ Opslaan';
    document.getElementById('i-status').textContent = '✅ Wijziging opgeslagen voor ' + klant;
  } else {
    veld.id = Date.now();
    invoer.push(veld);
    document.getElementById('i-status').textContent = '✅ Opgeslagen voor ' + klant;
  }

  bewaar('cc_invoer', invoer);

function printBon(id){

  doc.addImage(LOGO_BASE64, 'JPEG', marge, 6, 28, 16.3);
  doc.setFontSize(17);
  doc.setFont(undefined,'bold');
  doc.text('Vollebregt Cyclamen', pageW/2 + 12, 15, {align:'center'});
  doc.setLineWidth(0.5);
  doc.line(marge, 26, pageW-marge, 26);

  // ---- ID / Datum / Bon ----
  let y = 32;
  doc.setFontSize(8); doc.setFont(undefined,'normal');
  doc.text('ID:', marge, y);
  doc.setFont(undefined,'bold');
  doc.text(String(r.id), marge+8, y);
  doc.setFont(undefined,'normal');
  doc.text(fmtDatum(r.datum), pageW/2, y, {align:'center'});
  doc.text('Bon: ' + (r.bon||''), pageW-marge, y, {align:'right'});
  y += 3;
  doc.line(marge, y, pageW-marge, y);

  // ---- Afleveradres ----
  y += 5;
  doc.text('Afleveradres:', marge, y);
  y += 5;
  doc.setFontSize(11); doc.setFont(undefined,'bold');
  doc.text(r.klant, marge, y);
  doc.setFontSize(8); doc.setFont(undefined,'normal');
  doc.text('Transporteur: ' + (r.transporteur||'-'), pageW-marge, y, {align:'right'});
  y += 5;
  doc.text(k.adres||'', marge, y);
  y += 4;
  doc.text(k.woonplaats||'', marge, y);
  doc.text('Tel: ' + (k.telefoon||''), pageW/2 + 8, y);
  y += 4;
  doc.line(marge, y, pageW-marge, y);

  // ---- Tabel CC / Platen / Opzetstuk ----
  y += 6;
  const c2 = marge + breedte*0.46;
  const c3 = marge + breedte*0.72;
  const c4 = marge + breedte*0.96;
  doc.setFont(undefined,'bold');
  doc.text('cc', c2, y, {align:'center'});
  doc.text('platen', c3, y, {align:'center'});
  doc.text('opzetstuk', c4, y, {align:'center'});
  y += 3;
  doc.line(marge, y, pageW-marge, y);
  y += 6;
  doc.setFontSize(10);
  doc.text('Aantallen:', marge, y);
  doc.text(String(r.cc), c2, y, {align:'center'});
  doc.text(String(r.platen), c3, y, {align:'center'});
  doc.text(String(r.opzet), c4, y, {align:'center'});
  doc.setFontSize(8); doc.setFont(undefined,'normal');
  y += 3;
  doc.line(marge, y, pageW-marge, y);

  // ---- Opmerking (alleen tonen als ingevuld) ----
  if(r.opmerking){
    y += 5;
    const opmRegels = doc.splitTextToSize(r.opmerking, breedte);
    doc.text(opmRegels, marge, y);
    y += (opmRegels.length - 1) * 4;
  }
  y += 5;
  doc.line(marge, y, pageW-marge, y);

  // ---- Actueel Nieuw Saldo ----
  let rows = invoer.filter(x=>x.klant===r.klant && new Date(x.datum) <= new Date(r.datum));
  let saldoCC=0, saldoPL=0, saldoOP=0;
  rows.forEach(x=>{ saldoCC+=x.cc; saldoPL+=x.platen; saldoOP+=x.opzet; });

  y += 5;
  doc.setFont(undefined,'bold');
  doc.text('Actueel Nieuw Saldo', marge, y);
  doc.setFont(undefined,'normal');
  y += 2;
  const boxY = y;

  // toelichtingstekst naast de saldo-tabel
  doc.setFontSize(6.5);
  const tekst = [
    'Wilt u er voor zorgdragen dat het saldo binnen 5 werkdagen retour gebracht wordt,',
    'of overgeboekt naar ons FH nummer: 2881.',
    'Na 5 werkdagen kunnen we kosten in rekening brengen.',
    'Positief is ons tegoed, negatief is uw tegoed.'
  ];
  let ty = boxY + 5;
  tekst.forEach(t=>{ doc.text(t, marge+62, ty); ty += 3.8; });
  doc.setFontSize(8);

  // saldo-tabel
  y = boxY;
  const saldoRows = [['CC', saldoCC], ['Platen', saldoPL], ['Opzetstukken', saldoOP]];
  saldoRows.forEach(([label,val])=>{
    doc.rect(marge, y, 35, 5.5);
    doc.rect(marge+35, y, 22, 5.5);
    doc.text(label, marge+2, y+4);
    doc.text(String(val), marge+35+11, y+4, {align:'center'});
    y += 5.5;
  });

  doc.save('Bon_' + (r.bon||r.id) + '_' + r.klant + '.pdf');
}

function kleurCel(val){
  if(val > 0) return 'background:#c8e6c9;';
  if(val < 0) return 'background:#ffcdd2;';
  return '';
}

// ---------- OVERZICHT ----------
function toonOverzicht(){
  const klant = document.getElementById('o-klant').value;
  const tbody = document.querySelector('#o-tabel tbody');
  tbody.innerHTML = '';
  document.getElementById('o-klantinfo').textContent = '';
  document.getElementById('o-totcc').textContent='CC: 0';
  document.getElementById('o-totplaten').textContent='Platen: 0';
  document.getElementById('o-totopzet').textContent='Opzet: 0';
  if(!klant) return;

  const k = klanten.find(x=>x.naam===klant);
  if(k) document.getElementById('o-klantinfo').textContent = `${k.adres||''} ${k.woonplaats||''} · ${k.email||''}`;

  let rows = invoer.filter(r=>r.klant===klant);
  // sorteer: regels met saldo eerst, daarna op datum (nieuw->oud)
  rows.sort((a,b)=>{
    const sA = (Math.abs(a.cc)>0 || Math.abs(a.platen)>0);
    const sB = (Math.abs(b.cc)>0 || Math.abs(b.platen)>0);
    if(sA && !sB) return -1;
    if(!sA && sB) return 1;
    return new Date(b.datum) - new Date(a.datum);
  });

  let tcc=0, tpl=0, top=0;
  rows.forEach(r=>{
    tcc+=r.cc; tpl+=r.platen; top+=r.opzet;
    tbody.innerHTML += `<tr><td>${fmtDatum(r.datum)}</td><td>${r.week}</td><td>${r.bon}</td>
      <td style="${kleurCel(r.cc)}">${r.cc}</td>
      <td style="${kleurCel(r.platen)}">${r.platen}</td>
      <td style="${kleurCel(r.opzet)}">${r.opzet}</td>
      <td>${r.opmerking||''}</td></tr>`;
  });
  document.getElementById('o-totcc').textContent='CC: '+tcc;
  document.getElementById('o-totplaten').textContent='Platen: '+tpl;
  document.getElementById('o-totopzet').textContent='Opzet: '+top;
}

// ---------- PDF ----------
function exportPdf(){
  const klant = document.getElementById('o-klant').value;
  if(!klant){ alert('Kies eerst een klant.'); return; }
  const k = klanten.find(x=>x.naam===klant) || {};
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'mm', format:'a4' });
  const marge = 14, pageW = 210, breedte = pageW - marge*2;

  // ---- Logo + ons bedrijf ----
  doc.addImage(LOGO_BASE64, 'JPEG', marge, 8, 38.6, 22.4);
  doc.setFontSize(11); doc.setFont(undefined,'bold');
  doc.text('P.J.J.Vollebregt BV', marge+44, 14);
  doc.setFont(undefined,'normal');
  doc.text('Legmeerdijk 207', marge+44, 19);
  doc.text('Aalsmeer', marge+44, 24);
  doc.text('E-mail        youngplantsvollebregt@gmail.com', marge+44, 29);
  doc.text('Whatsapp    06 15001022', marge+44, 34);

  // ---- Klant / datum / saldo-uitleg ----
  let y = 38;
  doc.setLineWidth(0.4);
  doc.setFontSize(11); doc.setFont(undefined,'bold');
  doc.text(klant, marge, y);
  doc.setFont(undefined,'normal');
  doc.text('Datum: ' + new Date().toLocaleDateString('nl-NL'), pageW-marge, y, {align:'right'});
  y += 5;
  doc.setFontSize(9);
  doc.text(k.woonplaats||'', marge, y);
  doc.text('Groen is ons tegoed', pageW-marge, y, {align:'right'});
  y += 5;
  doc.text(k.email||'', marge, y);
  doc.text('Saldo kunt u overboeken naar ons FH nr: 2881', pageW/2, y, {align:'center'});
  doc.text('Rood is uw tegoed', pageW-marge, y, {align:'right'});
  y += 4;
  doc.line(marge, y, pageW-marge, y);

  // ---- Tabel kolommen ----
  const kol = [
    {label:'Datum', w:22},
    {label:'',      w:14}, // week
    {label:'ID-nr', w:18},
    {label:'cc-karren', w:26},
    {label:'platen', w:26},
    {label:'opzetstukken', w:28},
    {label:'Bon', w:16},
    {label:'Opmerking', w:30}
  ];
  let xpos = [];
  let xc = marge;
  kol.forEach(c=>{ xpos.push(xc); xc += c.w; });

  // ---- Data + sortering (saldo eerst) ----
  let rows = invoer.filter(r=>r.klant===klant).map(r=>({...r}));
  rows.sort((a,b)=>{
    const sA = (Math.abs(a.cc)>0 || Math.abs(a.platen)>0);
    const sB = (Math.abs(b.cc)>0 || Math.abs(b.platen)>0);
    if(sA && !sB) return -1;
    if(!sA && sB) return 1;
    return new Date(b.datum) - new Date(a.datum);
  });
  let tcc=0, tpl=0, top=0;
  rows.forEach(r=>{ tcc+=r.cc; tpl+=r.platen; top+=r.opzet; });

  // ---- Tabel header (grijze balk) ----
  y += 2;
  doc.setFillColor(216,216,216);
  doc.rect(marge, y, breedte, 9, 'F');
  doc.setFont(undefined,'bold'); doc.setFontSize(11);
  doc.text('Datum', xpos[0]+2, y+6);
  doc.text('ID-nr', xpos[2]+2, y+6);
  doc.text('cc-karren', xpos[3]+kol[3].w/2, y+6, {align:'center'});
  doc.text('platen', xpos[4]+kol[4].w/2, y+6, {align:'center'});
  doc.text('opzetstukken', xpos[5]+kol[5].w/2, y+6, {align:'center'});
  doc.text('Bon', xpos[6]+2, y+6);
  doc.text('Opmerking', xpos[7]+2, y+6);
  y += 9;

  // ---- Huidig Saldo regel ----
  doc.setFont(undefined,'bold'); doc.setFontSize(10);
  doc.text('Huidig Saldo', xpos[0]+2, y+6);
  pdfKleurCel(doc, tcc, xpos[3], y, kol[3].w, 8);
  pdfKleurCel(doc, tpl, xpos[4], y, kol[4].w, 8);
  pdfKleurCel(doc, top, xpos[5], y, kol[5].w, 8);
  doc.setFont(undefined,'bold');
  doc.text(String(tcc), xpos[3]+kol[3].w/2, y+6, {align:'center'});
  doc.text(String(tpl), xpos[4]+kol[4].w/2, y+6, {align:'center'});
  doc.text(String(top), xpos[5]+kol[5].w/2, y+6, {align:'center'});
  y += 12;
  doc.line(marge, y-3, pageW-marge, y-3);

  // ---- Data rijen ----
  doc.setFont(undefined,'normal'); doc.setFontSize(9);
  rows.forEach(r=>{
    if(y > 280){ doc.addPage(); y = 20; }
    const rh = 5.5;
    pdfKleurCel(doc, r.cc, xpos[3], y, kol[3].w, rh);
    pdfKleurCel(doc, r.platen, xpos[4], y, kol[4].w, rh);
    if(r.opzet) pdfKleurCel(doc, r.opzet, xpos[5], y, kol[5].w, rh);

    const kortId = String(r.id||'').slice(-5);
    doc.text(fmtDatum(r.datum), xpos[0], y+4);
    doc.text(r.week, xpos[1]+2, y+4);
    doc.text(kortId, xpos[2]+2, y+4);
    doc.text(r.cc ? String(r.cc) : '', xpos[3]+kol[3].w/2, y+4, {align:'center'});
    doc.text(r.platen ? String(r.platen) : '', xpos[4]+kol[4].w/2, y+4, {align:'center'});
    doc.text(r.opzet ? String(r.opzet) : '', xpos[5]+kol[5].w/2, y+4, {align:'center'});
    doc.text(r.bon ? String(r.bon) : '', xpos[6], y+4);
    doc.text(r.opmerking || (r.transporteur||''), xpos[7], y+4);
    y += rh;
  });

  doc.save('Fustoverzicht_' + klant + '.pdf');
}

// kleurt een celvlak groen (positief) of rood (negatief)
function pdfKleurCel(doc, val, x, y, w, h){
  if(val > 0) doc.setFillColor(200,230,201);
  else if(val < 0) doc.setFillColor(255,205,210);
  else return;
  doc.rect(x, y, w, h, 'F');
}

// ---------- KLANTEN ----------
let bewerkKlantNaam = null;

function opslaanKlant(){
  const naam = document.getElementById('k-naam').value.trim();
  if(!naam){ document.getElementById('k-status').textContent='❌ Naam verplicht.'; return; }
  const data = {
    naam,
    adres: document.getElementById('k-adres').value.trim(),
    woonplaats: document.getElementById('k-woonplaats').value.trim(),
    telefoon: document.getElementById('k-telefoon').value.trim(),
    email: document.getElementById('k-email').value.trim(),
    transporteur: document.getElementById('k-transporteur').value.trim()
  };

  if(bewerkKlantNaam){
    // update bestaande klant, en evt. naam in invoer aanpassen
    const idx = klanten.findIndex(k=>k.naam===bewerkKlantNaam);
    if(idx>-1) klanten[idx] = data;
    if(bewerkKlantNaam !== naam){
      invoer.forEach(r=>{ if(r.klant===bewerkKlantNaam) r.klant = naam; });
      bewaar('cc_invoer', invoer);
    }
    document.getElementById('k-status').textContent='✅ Gewijzigd.';
    bewerkKlantNaam = null;
    document.querySelector('#tab-klanten button').textContent = '➕ Klant toevoegen';
  } else {
    klanten.push(data);
    document.getElementById('k-status').textContent='✅ Toegevoegd.';
  }

  bewaar('cc_klanten', klanten);
  ['k-naam','k-adres','k-woonplaats','k-telefoon','k-email','k-transporteur'].forEach(id=>document.getElementById(id).value='');
  vulKlantSelects();
  toonKlanten();
}

function bewerkKlant(naam){
  const k = klanten.find(x=>x.naam===naam);
  if(!k) return;
  bewerkKlantNaam = naam;
  document.getElementById('k-naam').value = k.naam;
  document.getElementById('k-adres').value = k.adres||'';
  document.getElementById('k-woonplaats').value = k.woonplaats||'';
  document.getElementById('k-telefoon').value = k.telefoon||'';
  document.getElementById('k-email').value = k.email||'';
  document.getElementById('k-transporteur').value = k.transporteur||'';
  document.querySelector('#tab-klanten button').textContent = '💾 Wijziging opslaan';
  document.getElementById('k-naam').scrollIntoView({behavior:'smooth'});
}
function verwijderKlant(naam){
  if(!confirm('Klant "'+naam+'" verwijderen?')) return;
  klanten = klanten.filter(k=>k.naam!==naam);
  bewaar('cc_klanten', klanten);
  vulKlantSelects();
  toonKlanten();
}
function toonKlanten(){
  document.getElementById('k-lijst').innerHTML = klanten.map(k=>
    `<div class="card" style="padding:8px 10px;">
       <b>${k.naam}</b> <span class="badge">${k.woonplaats||''}</span>
       <div class="small">${k.email||''} ${k.telefoon||''}</div>
       <div class="item-actions">
         <button class="secondary" onclick="bewerkKlant('${k.naam}')">Bewerken</button>
         <button class="danger" onclick="verwijderKlant('${k.naam}')">Verwijderen</button>
       </div>
     </div>`
  ).join('') || '<div class="small">Nog geen klanten toegevoegd.</div>';
}
